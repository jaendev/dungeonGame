<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#1a0a2e"/>

  <!-- Sword blade -->
  <line x1="32" y1="8" x2="32" y2="44" stroke="#c0c0c0" stroke-width="3" stroke-linecap="round"/>
  <!-- Sword tip -->
  <polygon points="32,6 29,14 35,14" fill="#c0c0c0"/>
  <!-- Crossguard -->
  <rect x="20" y="38" width="24" height="4" rx="2" fill="#b8860b"/>
  <!-- Grip -->
  <rect x="30" y="42" width="4" height="10" rx="1" fill="#8B4513"/>
  <!-- Pommel -->
  <circle cx="32" cy="54" r="3" fill="#b8860b"/>

  <!-- Small stars -->
  <circle cx="12" cy="12" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="52" cy="10" r="1" fill="#FFD700" opacity="0.6"/>
  <circle cx="10" cy="50" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="54" cy="52" r="1.5" fill="#FFD700" opacity="0.7"/>
</svg>